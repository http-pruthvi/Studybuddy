services:
  # 1. FastAPI Web Service (The API gateway)
  - type: web
    name: studybuddy-api
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir server
    envVars:
      - key: PORT
        value: 10000
      - key: SARVAM_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false

  # 2. Render Workflows Worker (Processes the durable background tasks)
  - type: worker
    name: studybuddy-workflows-worker
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: python server/workflows.py
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
